<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">PulseBoard compact Windows resource and Codex dashboard</title>
  <desc id="desc">A privacy-safe interface preview using sample CPU, GPU, memory, disk, process, and Codex usage data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#080b0e"/><stop offset="1" stop-color="#0c1518"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .panel{fill:#10151a;stroke:#20292e}.muted{fill:#788783;font-family:'Segoe UI',Arial,sans-serif}.text{fill:#eef4f1;font-family:'Segoe UI',Arial,sans-serif}.small{font-size:14px}.tiny{font-size:11px}.label{font-size:15px;font-weight:600}.big{font-size:40px;font-weight:700}.line{stroke:#20292e}.cyan{stroke:#59e1d0}.violet{stroke:#a58cff}.lime{stroke:#b6ef5b}.orange{stroke:#ffad5c}
    </style>
  </defs>
  <rect width="1200" height="630" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="628" rx="17" fill="none" stroke="#263238"/>
  <g transform="translate(28 25)">
    <rect width="30" height="30" fill="none" stroke="#59e1d0"/><path d="M6 18h6l4-9 4 14 4-8" fill="none" stroke="#59e1d0" stroke-width="2"/>
    <text x="47" y="15" class="text" font-size="19" font-weight="700">PulseBoard</text><text x="47" y="34" class="muted tiny">WINDOWS PC · SAMPLE DATA</text>
    <text x="1144" y="15" text-anchor="end" fill="#59e1d0" font-family="Segoe UI,Arial" font-size="16" font-weight="700">RUNNING SMOOTHLY</text><text x="1144" y="34" text-anchor="end" class="muted tiny">LOCAL-ONLY MONITORING</text>
  </g>
  <g transform="translate(28 76)">
    <rect class="panel" width="1144" height="184"/>
    <g transform="translate(145 95)"><circle r="54" fill="none" stroke="#20292e" stroke-width="13" stroke-dasharray="255 84" transform="rotate(135)"/><circle r="54" fill="none" class="cyan" stroke-width="13" stroke-linecap="round" stroke-dasharray="108 231" transform="rotate(135)" filter="url(#glow)"/><text y="-72" text-anchor="middle" class="muted label">CPU</text><text y="12" text-anchor="middle" class="text big">42<tspan class="muted small">%</tspan></text><text y="78" text-anchor="middle" class="muted tiny">16 threads · 4.2 GHz</text></g>
    <g transform="translate(430 95)"><circle r="54" fill="none" stroke="#20292e" stroke-width="13" stroke-dasharray="255 84" transform="rotate(135)"/><circle r="54" fill="none" class="violet" stroke-width="13" stroke-linecap="round" stroke-dasharray="71 268" transform="rotate(135)"/><text y="-72" text-anchor="middle" class="muted label">GPU</text><text y="12" text-anchor="middle" class="text big">28<tspan class="muted small">%</tspan></text><text y="78" text-anchor="middle" class="muted tiny">62°C</text></g>
    <g transform="translate(715 95)"><circle r="54" fill="none" stroke="#20292e" stroke-width="13" stroke-dasharray="255 84" transform="rotate(135)"/><circle r="54" fill="none" class="lime" stroke-width="13" stroke-linecap="round" stroke-dasharray="142 197" transform="rotate(135)"/><text y="-72" text-anchor="middle" class="muted label">MEMORY</text><text y="12" text-anchor="middle" class="text big">56<tspan class="muted small">%</tspan></text><text y="78" text-anchor="middle" class="muted tiny">18.0 GB / 32.0 GB</text></g>
    <g transform="translate(1000 95)"><circle r="54" fill="none" stroke="#20292e" stroke-width="13" stroke-dasharray="255 84" transform="rotate(135)"/><circle r="54" fill="none" class="orange" stroke-width="13" stroke-linecap="round" stroke-dasharray="165 174" transform="rotate(135)"/><text y="-72" text-anchor="middle" class="muted label">SYSTEM DISK</text><text y="12" text-anchor="middle" class="text big">65<tspan class="muted small">%</tspan></text><text y="78" text-anchor="middle" class="muted tiny">350 GB free</text></g>
  </g>
  <g transform="translate(28 272)">
    <rect class="panel" width="440" height="126"/><text x="18" y="23" class="muted small" font-weight="700">LAST 60 SECONDS</text>
    <path d="M14 91 L42 83 70 91 98 73 126 80 154 67 182 85 210 58 238 78 266 52 294 70 322 40 350 63 378 48 422 57" fill="none" class="cyan" stroke-width="2"/><path d="M14 104 L80 102 146 103 212 96 278 99 344 90 422 93" fill="none" class="violet" stroke-width="2"/><path d="M14 82 L110 81 206 79 302 80 422 76" fill="none" class="lime" stroke-width="2"/>
    <rect x="480" class="panel" width="252" height="126"/><text x="498" y="23" class="text label">LIVE THROUGHPUT</text><text x="498" y="50" class="muted tiny">DOWNLOAD</text><text x="498" y="70" class="text small" font-weight="700">24.8 MB/s</text><text x="613" y="50" class="muted tiny">UPLOAD</text><text x="613" y="70" class="text small" font-weight="700">3.2 MB/s</text><text x="498" y="92" class="muted tiny">DISK READ</text><text x="498" y="112" class="text small" font-weight="700">118 MB/s</text><text x="613" y="92" class="muted tiny">DISK WRITE</text><text x="613" y="112" class="text small" font-weight="700">42 MB/s</text>
    <rect x="744" class="panel" width="400" height="126"/><text x="762" y="23" class="text label">CODEX USAGE</text><text x="1126" y="23" text-anchor="end" fill="#59e1d0" font-family="Segoe UI,Arial" class="tiny">CONNECTED</text><text x="762" y="48" class="muted tiny">7-DAY QUOTA · RESETS FRIDAY</text><text x="1126" y="48" text-anchor="end" class="text small">USED 34%</text><rect x="762" y="57" width="364" height="4" fill="#20292e"/><rect x="762" y="57" width="124" height="4" fill="#59e1d0"/><text x="762" y="82" class="muted tiny">TASK CONTEXT 52K / 258K</text><text x="1126" y="82" text-anchor="end" class="text small">20%</text><rect x="762" y="91" width="364" height="4" fill="#20292e"/><rect x="762" y="91" width="73" height="4" fill="#a58cff"/><text x="762" y="116" class="muted tiny">DAILY 1.2M · LIFETIME 8.4M TOKENS</text>
  </g>
  <g transform="translate(28 410)">
    <rect class="panel" width="560" height="186"/><text x="18" y="28" class="text label">TOP CPU PROGRAMS</text><text x="542" y="28" text-anchor="end" class="muted tiny">GROUPED BY APP</text>
    <g class="small"><text x="20" y="62" class="text">VideoEditor.exe</text><text x="532" y="62" text-anchor="end" class="text">18.7%</text><line x1="18" y1="74" x2="542" y2="74" class="line"/><text x="20" y="100" class="text">Browser.exe</text><text x="532" y="100" text-anchor="end" class="text">9.4%</text><line x1="18" y1="112" x2="542" y2="112" class="line"/><text x="20" y="138" class="text">Code.exe</text><text x="532" y="138" text-anchor="end" class="text">6.1%</text><line x1="18" y1="150" x2="542" y2="150" class="line"/><text x="20" y="176" class="text">Music.exe</text><text x="532" y="176" text-anchor="end" class="text">2.5%</text></g>
    <rect x="584" class="panel" width="560" height="186"/><text x="602" y="28" class="text label">TOP MEMORY PROGRAMS</text><text x="1126" y="28" text-anchor="end" class="muted tiny">GROUPED BY APP</text>
    <g class="small"><text x="604" y="62" class="text">Browser.exe</text><text x="1116" y="62" text-anchor="end" class="text">2.8 GB</text><line x1="602" y1="74" x2="1126" y2="74" class="line"/><text x="604" y="100" class="text">Code.exe</text><text x="1116" y="100" text-anchor="end" class="text">1.6 GB</text><line x1="602" y1="112" x2="1126" y2="112" class="line"/><text x="604" y="138" class="text">VideoEditor.exe</text><text x="1116" y="138" text-anchor="end" class="text">1.2 GB</text><line x1="602" y1="150" x2="1126" y2="150" class="line"/><text x="604" y="176" class="text">Chat.exe</text><text x="1116" y="176" text-anchor="end" class="text">840 MB</text></g>
  </g>
  <text x="28" y="618" class="muted tiny">NATIVE WINDOWS APP · NO BROWSER · NO TELEMETRY</text><text x="1172" y="618" text-anchor="end" class="muted tiny">SAMPLE DATA</text>
</svg>
